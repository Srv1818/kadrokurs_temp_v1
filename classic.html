/* ── Destructure inner pages from window ── */

/* ─── School Seal SVG ─────────────────────────────── */

<svg width={size} height={size} viewBox="0 0 80 80" fill="none">

/* ─── NAVBAR ─────────────────────────────────────── */
function Navbar({ page, nav }) {
  const [drawerOpen, setDrawerOpen] = useState(false);

  const links = [
  { key: 'home', label: 'Ana Sayfa' },
  { key: 'kurumsal', label: 'Kurumsal' },
  { key: 'programlar', label: 'Programlar' },
  { key: 'basarilarimiz', label: 'Başarılarımız' },

  { key: 'blog', label: 'Blog' },
  { key: 'iletisim', label: 'İletişim' }];

  const navTo = (key) => {nav(key);setDrawerOpen(false);};

  return (
    <>
    <nav className="nav-root">
      <div className="nav-inner">
        <div className="nav-logo" onClick={() => navTo('home')}>
          <div className="nav-brand">KADROkurs</div>
        </div>

        <div className="nav-links">
          {links.map((l) =>
            <button key={l.key} onClick={() => navTo(l.key)} className={`nav-link${page === l.key ? ' active' : ''}`}>{l.label}</button>
            )}
          <button onClick={() => navTo('basvuru')} className="nav-cta">BAŞVUR</button>
        </div>
        <button className={`nav-hamburger${drawerOpen ? ' open' : ''}`} onClick={() => setDrawerOpen(!drawerOpen)} aria-label="Menü">
          <span></span><span></span><span></span>
        </button>
      </div>
    </nav>

    {/* ── Mobile Drawer ── */}
    <div className={`nav-drawer${drawerOpen ? ' open' : ''}`}>
      <div className="nav-drawer-backdrop" onClick={() => setDrawerOpen(false)} />
      <div className="nav-drawer-panel">
        <div className="nav-drawer-header">
          <div style={{ fontFamily: 'Playfair Display, serif', fontSize: 20, fontWeight: 700, color: '#7B1D1D' }}>KADROkurs</div>
          <button className="nav-drawer-close" onClick={() => setDrawerOpen(false)}>✕</button>
        </div>

    sessionStorage.setItem('kadro_pg', p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const pageMap = {
    home: <HomePage nav={nav} />,
    kurumsal: <KurumsalPage nav={nav} navigate={nav} />,
    programlar: <ProgramlarPage nav={nav} navigate={nav} />,
    basarilarimiz: <BasarilarimizPage nav={nav} navigate={nav} />,
    blog: <BlogPage nav={nav} navigate={nav} />,
    subelerimiz: <SubelerimizPage nav={nav} navigate={nav} />,
    iletisim: <IletisimPage nav={nav} navigate={nav} />,
    basvuru: <BasvuruPage nav={nav} navigate={nav} />
  };

  return (
    <div>
          <Navbar page={page} nav={nav} />
          <main className="page-in" key={page}>
            {pageMap[page] || pageMap['home']}
          </main>
          <Footer nav={nav} />
        </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
(function() {
  function isMobile() { return window.innerWidth <= 640; }

  function setupDots(row) {
    if (row._dotsReady) return;
    row._dotsReady = true;
    // wrap
    const wrap = document.createElement('div');
    wrap.className = 'carousel-wrap';
    row.parentNode.insertBefore(wrap, row);
    wrap.appendChild(row);
    // dots
    const dotsEl = document.createElement('div');
    dotsEl.className = 'carousel-dots';
    const count = row.children.length;
    for (let i = 0; i < count; i++) {
      const d = document.createElement('span');
      if (i === 0) d.className = 'active';
      dotsEl.appendChild(d);
    }
    wrap.appendChild(dotsEl);
    // scroll → active dot
    row.addEventListener('scroll', function() {
      const idx = Math.round(row.scrollLeft / row.offsetWidth);
      dotsEl.querySelectorAll('span').forEach((d, i) => d.className = i === idx ? 'active' : '');
    }, { passive: true });
  }

  function teardownDots(row) {
    if (!row._dotsReady) return;
    const wrap = row.parentNode;
    if (wrap && wrap.classList.contains('carousel-wrap')) {
      wrap.parentNode.insertBefore(row, wrap);
      wrap.remove();
    }
    row._dotsReady = false;
  }

  function refresh() {
    document.querySelectorAll('.card-row.cols-3, .card-row.cols-4').forEach(function(row) {
      if (isMobile()) setupDots(row);
      else teardownDots(row);
    });
  }

  // watch React renders
  const obs = new MutationObserver(refresh);
  obs.observe(document.getElementById('root'), { childList: true, subtree: true });
  window.addEventListener('resize', refresh);
  refresh();
})();
</script>
</body>
