  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ght: 800;\n  font-display: swap;\n  src: url(\"b867043a-6314-4400-a1a9-66aebe94c8e4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n:root{\n  --ivory:#F5F0E7;--paper:#fff;--bordo:#7B1D1D;--bordo-hi:#5E1414;--bordo-lo:#A23030;\n  --orange:#FF6B3D;--ink:#1C1714;--muted:#6E655C;--faint:#9A8E83;--hair:#E2D9CA;\n  --mint:#15C08A;--mint-deep:#0E9E72;--mint-soft:#D7F5E8;--gold:#B58A42;--gold-deep:#96702F;--gold-soft:#F1E9D6;\n}\n*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}\nhtml{scroll-behavior:smooth;}\nbody{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--ivory);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;}\n\n.wrap{max-width:1240px;margin:0 auto;padding:clamp(28px,5vw,56px) clamp(20px,5vw,56px) clamp(48px,7vw,90px);}\n\n/* header */\n.top{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:clamp(48px,9vh,110px);}\n.brand{display:flex;align-items:center;gap:12px;}\n.brand-mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(140deg,var(--bordo-lo),var(--bordo-hi));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:19px;box-shadow:0 8px 18px rgba(123,29,29,.26);}\n.brand-name{font-family:'Playfair Display',serif;font-weight:700;font-size:21px;letter-spacing:-.3px;}\n.brand-name b{color:var(--bordo);}\n.top .meta{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--faint);font-weight:600;}\n\n/* intro */\n.intro{max-width:760px;margin-bottom:clamp(40px,7vh,72px);}\n.intro .eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--bordo);font-weight:700;margin-bottom:22px;}\n.intro .eyebrow::before{content:'';width:30px;height:2px;background:var(--orange);}\n.intro h1{font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(36px,5.4vw,68px);line-height:1.03;letter-spacing:-.02em;color:var(--ink);text-wrap:balance;}\n.intro h1 em{font-style:italic;color:var(--bordo);}\n.intro p{font-size:clamp(15px,1.2vw,17.5px);color:var(--muted);margin-top:22px;max-width:560px;line-height:1.75;text-wrap:pretty;}\n\n/* grid */\n.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(218px,1fr));gap:clamp(16px,1.6vw,22px);}\n.card{position:relative;display:flex;flex-direction:column;text-decoration:none;color:inherit;min-height:340px;padding:30px;transition:transform .2s ease,box-shadow .2s ease;overflow:hidden;}\n.card .num{font-family:'Plus Jakarta Sans';font-size:12px;font-weight:700;letter-spacing:2px;color:var(--faint);}\n.card .preview{flex:1;display:flex;align-items:center;justify-content:center;margin:22px 0;}\n.card .ctitle{font-size:clamp(20px,1.7vw,24px);font-weight:800;letter-spacing:-.02em;line-height:1.1;}\n.card .cdesc{font-size:13.5px;color:var(--muted);margin-top:10px;line-height:1.6;}\n.card .go{margin-top:20px;display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:14px;}\n.card .go .arr{transition:transform .2s;}\n.card:hover .go .arr{transform:translateX(5px);}\n\n/* card 1 — Soft Brutalism */\n.c-brut{background:#fff;border:3px solid var(--ink);box-shadow:8px 8px 0 var(--bordo);border-radius:2px;}\n.c-brut:hover{transform:translate(-3px,-3px);box-shadow:12px 12px 0 var(--bordo);}\n.c-brut .ctitle{color:var(--bordo);text-transform:uppercase;}\n.c-brut .go{color:var(--ink);}\n.brut-vis{display:flex;flex-direction:column;gap:10px;width:100%;}\n.brut-vis .bar{height:18px;border:2.5px solid var(--ink);background:#fff;}\n.brut-vis .bar.b1{width:80%;background:var(--bordo);}\n.brut-vis .bar.b2{width:55%;}\n.brut-vis .bar.b3{width:38px;height:38px;background:var(--orange);box-shadow:4px 4px 0 var(--ink);align-self:flex-start;border-radius:0;}\n\n/* card 2 — Premium Bento */\n.c-bento{background:linear-gradient(150deg,#8E2222,var(--bordo) 45%,var(--bordo-hi));color:#fff;border-radius:26px;box-shadow:0 4px 14px rgba(123,29,29,.18),0 26px 56px rgba(123,29,29,.22);}\n.c-bento:hover{transform:translateY(-5px);box-shadow:0 10px 22px rgba(123,29,29,.24),0 34px 70px rgba(123,29,29,.3);}\n.c-bento .num{color:rgba(255,255,255,.55);}\n.c-bento .cdesc{color:rgba(255,255,255,.78);}\n.c-bento .go{color:#fff;}\n.c-bento::after{content:'';position:absolute;width:220px;height:220px;border-radius:50%;right:-70px;bottom:-90px;background:radial-gradient(circle,rgba(255,255,255,.18),transparent 65%);}\n.bento-vis{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;}\n.bento-vis div{border-radius:12px;background:rgba(255,255,255,.16);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.28);}\n.bento-vis .big{grid-row:span 2;min-height:74px;}\n.bento-vis .sm{min-height:33px;}\n\n/* card 4 — Premium Elite */\n.c-vibrant{background:#F7F1E6;border:1px solid var(--hair);border-radius:20px;box-shadow:0 1px 2px rgba(36,27,22,.04),0 14px 36px rgba(36,27,22,.06);}\n.c-vibrant:hover{transform:translateY(-5px);box-shadow:0 4px 10px rgba(36,27,22,.06),0 24px 52px rgba(36,27,22,.1);}\n.c-vibrant .ctitle{color:var(--bordo);}\n.c-vibrant .go{color:var(--gold-deep);}\n.vib-vis{display:flex;flex-direction:column;gap:9px;width:100%;}\n.vib-vis .vbp{height:48px;border-radius:11px;background:linear-gradient(135deg,#F1E9D6,#FBF6EC);border:1px solid var(--hair);}\n.vib-vis .vrow{display:grid;grid-template-columns:1fr 1fr;gap:9px;}\n.vib-vis .vt{height:34px;border-radius:9px;background:#fff;border:1px solid var(--hair);position:relative;}\n.vib-vis .vt::before{content:'';position:absolute;left:9px;top:10px;width:26px;height:6px;border-radius:3px;}\n.vib-vis .vt.b::before{background:var(--bordo);}\n.vib-vis .vt.g::before{background:var(--gold);}\n\n/* card 5 — Classic (current) */\n.c-classic{background:linear-gradient(160deg,#8A2222 0%,var
